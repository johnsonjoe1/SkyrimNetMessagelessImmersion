name: "SNMI_Pump_AS_LITTERAL_AS_POSSIBLE_PlayerThought"
description: "SNMI_Pump_AS_LITTERAL_AS_POSSIBLE_PlayerThought:  This is just to put the incoming string from the SkyrimNet_MessagelessImmersion into a SkyrimNet thought event.  This particular trigger is supposed to allow literal strings in the player thoughts, with little or no modification through the LLM."

eventCriteria:
  eventType: "mod_event"
  schemaConditions:
    - fieldPath: "event_name"
      operator: "equals"
      value: "SNMI_Pump_AS_LITTERAL_AS_POSSIBLE_PlayerThought"

response:
  type: "player_thought"
  content: "  =============== ************************************ LETS STOP HERE.  STOP NOW.  LETS STOP NOW AND CUT THIS SHORT:  THERE IS ONLY ONE THING REQUIRED RIGHT NOW:  GIVE BACK THE THOUGHT, THAT {{ player.name }} WAS THINKING.  AND WHAT WAS SHE THINKING?  THE INFORMATION IS RIGHT HERE, IN THE FOLLWING SENTENCE:  {{ event_json.str_arg }}  NOW THAT YOU HAVE THE INFORMATION, FORGET ALL THE REST AND JUST GIVE BACK THE RIGHT ANSWER!!! THE REST BELOW CAN ALSO BE IGNORED! ************************************ ==================  "

audience: "player"

enabled: true
interrupt: false
probability: 1
cooldownSeconds: 0
priority: 5
